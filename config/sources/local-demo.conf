# Source config used by scripts/demo-local.sh and by CI.
# Pulls from a fake tree on localhost so the whole pipeline can be exercised
# without any real Windows or Pi host.
#
# demo-local.sh overwrites KEY at runtime with a generated throwaway key, and
# sets up a matching authorized_keys entry in the current user's ~/.ssh.

NAME="local-demo"

HOST="127.0.0.1"
PORT=22
REMOTE_USER="${BACKUP_DEMO_USER:-$(id -un)}"

KEY="/tmp/backup-demo/id_demo"
SRC_PATH="/tmp/backup-demo/src/"

# Plain -a is plenty for the demo — no special filesystem features to preserve.
RSYNC_OPTS="-a --numeric-ids --delete --stats"

EXCLUDE_FILE=""
PRE_CMD=""
POST_CMD=""
HOOK_KEY=""
