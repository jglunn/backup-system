apiVersion: 1

contactPoints:
  - orgId: 1
    name: email-ops
    receivers:
      - uid: email-ops-receiver
        type: email
        settings:
          # Grafana expands {{ ... }} templating from alert labels/annotations.
          addresses: ops@example.com
          singleEmail: false
          message: |
            {{ range .Alerts }}
            [{{ .Status }}] {{ .Labels.alertname }} — {{ .Labels.source }}
            {{ .Annotations.summary }}
            {{ .Annotations.description }}
            {{ end }}

policies:
  - orgId: 1
    receiver: email-ops
    group_by: [alertname, source]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
