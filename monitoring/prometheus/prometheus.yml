global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: backup-monitor

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: node_exporter
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
