# Monitoring stack: node_exporter (host + textfile collector), Prometheus
# (metrics store + alert evaluation), Grafana (dashboards + native alerts →
# SMTP). No Alertmanager — Grafana handles notification routing.
#
# All service ports bind to 127.0.0.1 on the host. Reach them via SSH tunnel:
#   ssh -L 3000:localhost:3000 -L 9090:localhost:9090 backup-host

services:
  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: backup-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /:/host:ro,rslave
      - /srv/backups/metrics:/var/lib/node_exporter/textfile_collector:ro
    command:
      - --path.rootfs=/host
      - --collector.textfile.directory=/var/lib/node_exporter/textfile_collector
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|run|host|etc)($$|/)
    ports:
      - "127.0.0.1:9100:9100"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: backup-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=90d
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - node_exporter

  grafana:
    image: grafana/grafana:11.2.0
    container_name: backup-grafana
    restart: unless-stopped
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    env_file: .env
    environment:
      - GF_SERVER_HTTP_ADDR=127.0.0.1
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
